title: |
  Visual RAG：面向视频检索的自主视觉搜索智能体
author: |
  张震宇 —— 硕士学位论文（草稿）
documentclass: ctexrep
classoption:
  - UTF8
  - fontset=fandol
mainfont: Arial
geometry: margin=1in
linkcolor: black
nocite: |
  @*
abstract: |
  视频被广泛记录，却仍难以按具体时刻检索，尤其当查询表达因果或时序意图时更是如此。本文提出
  Visual RAG：一个智能体式检索增强生成系统。系统为带时间戳的视觉与转录证据建立索引，将问题分解为
  更适合检索的描述，搜索并重排候选视频片段，最后生成带时间戳依据的回答。我们在 NExT-QA 与
  NExT-GQA 的 567 个视频、3,358 个带时序标注的问题上进行评估。结果表明，视觉检索显著优于转录文本
  检索；SigLIP 与查询分解将语料库范围的 R@1 从 0.026 提升至 0.048。LangGraph 智能体将五选一问答
  准确率从 0.447 提升至 0.547，而加入视觉证据后，时序问题准确率从 0.341 提升至 0.636。实验进一步
  区分了召回、排序精度与证据传递三个独立瓶颈，并为消费级硬件上的视频 RAG 提供了可复现的设计依据。
