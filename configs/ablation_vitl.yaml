# W8 backbone ablation: ViT-L-14 as the retrieval index (not just the reranker).
# Reuses the segment embeddings precomputed for W6 (artifacts/embeddings_vitl).

paths:
  data_root: data
  videos: data/nextqa/videos
  annotations: data/nextqa/annotations
  artifacts: artifacts
  frames: artifacts/frames
  transcripts: artifacts/transcripts
  ocr: artifacts/ocr
  embeddings: artifacts/embeddings_vitl
  chroma: artifacts/chroma_vitl

device: auto

embed:
  backbone: ViT-L-14
  pretrained: laion2b_s32b_b82k
  batch_size: 16

segment:
  window_sec: 8.0
  stride_sec: 4.0

decompose:
  provider: deepseek
  model: deepseek-chat
  max_queries: 4
  include_original: true
  workers: 16
